# Servidor y Nombre
server.port=8080
spring.application.name=customer-dev
custom.log.message=Ejecutando en DEV

# Consola H2 (Acceso via /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logs de SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true